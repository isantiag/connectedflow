<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectedFlow — Interactive Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;overflow:hidden;height:100vh;width:100vw;}
.demo-container{width:100%;height:100%;display:flex;flex-direction:column;}
.demo-header{background:#0f172a;color:#e2e8f0;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.demo-header .brand{font-weight:700;color:#3b82f6;font-size:15px;}
.demo-header .controls{display:flex;gap:8px;align-items:center;}
.demo-header button{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
.demo-header button:hover{background:#334155;}
.demo-header button.active-btn{background:#3b82f6;border-color:#3b82f6;color:#fff;}
.progress-bar{height:3px;background:#1e293b;width:100%;}
.progress-fill{height:100%;background:#3b82f6;transition:width 0.3s ease;width:0%;}
.app-frame{flex:1;display:flex;overflow:hidden;}
</style>
</head>
<body>
<div class="demo-container">
  <div class="demo-header">
    <span class="brand">ConnectedFlow Demo</span>
    <div class="controls">
      <span id="scene-label" style="color:#94a3b8;margin-right:12px;">Scene 1 of 7</span>
      <button onclick="prevScene()">← Prev</button>
      <button class="active-btn" onclick="toggleAutoPlay()" id="autoBtn">▶ Auto Play</button>
      <button onclick="nextScene()">Next →</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="app-frame" id="appFrame"></div>
</div>
</body>
</html>
<script>
// =========================================================================
// Scene definitions — each scene is a "screen" of the app with animations
// =========================================================================
const scenes = [
// ---- SCENE 1: Login ----
{
  title: "Scene 1 of 7 — Login",
  duration: 4000,
  render: () => `
  <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);">
    <div style="background:#fff;border-radius:12px;padding:48px;width:380px;box-shadow:0 25px 50px rgba(0,0,0,0.3);animation:fadeUp 0.5s ease;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:24px;font-weight:700;color:#3b82f6;">ConnectedFlow</div>
        <div style="font-size:13px;color:#64748b;margin-top:4px;">AI-Driven ICD Management</div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:12px;font-weight:500;color:#475569;display:block;margin-bottom:4px;">Email</label>
        <div class="input-anim" style="border:1px solid #e2e8f0;border-radius:6px;padding:10px 12px;font-size:14px;color:#0f172a;animation:typeEmail 1.5s ease 0.5s forwards;overflow:hidden;white-space:nowrap;">
          <span class="typed-text"></span><span class="cursor">|</span>
        </div>
      </div>
      <div style="margin-bottom:24px;">
        <label style="font-size:12px;font-weight:500;color:#475569;display:block;margin-bottom:4px;">Password</label>
        <div style="border:1px solid #e2e8f0;border-radius:6px;padding:10px 12px;font-size:14px;color:#0f172a;animation:typePass 1s ease 2.5s forwards;">
          <span class="pass-dots"></span><span class="cursor2" style="opacity:0;">|</span>
        </div>
      </div>
      <div class="login-btn-wrap" style="animation:showBtn 0.3s ease 3.5s forwards;opacity:0;">
        <div style="background:#3b82f6;color:#fff;text-align:center;padding:10px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;">Sign In</div>
      </div>
    </div>
  </div>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .typed-text::after{content:'engineer@acme-aviation.com';animation:revealEmail 1.5s steps(28) 0.8s forwards;overflow:hidden;display:inline-block;width:0;white-space:nowrap;}
    @keyframes revealEmail{to{width:220px;}}
    .cursor{animation:blink 0.6s infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
    .pass-dots::after{content:'••••••••••';animation:revealPass 0.8s steps(10) 2.5s forwards;overflow:hidden;display:inline-block;width:0;}
    @keyframes revealPass{to{width:80px;}}
    .cursor2{animation:blink 0.6s infinite 2.5s;}
    @keyframes showBtn{to{opacity:1;}}
  </style>`
},
// ---- SCENE 2: Dashboard ----
{
  title: "Scene 2 of 7 — Dashboard",
  duration: 5000,
  render: () => `
  <div style="display:flex;width:100%;height:100%;">
    ${sidebar('Dashboard')}

      ${topbar()}

            ${activityRow('Bus overload detected on CAN_1','1 hr ago','#ef4444')}
            ${activityRow('ADC_ICD_Rev3.pdf extracted','3 hrs ago','#8b5cf6')}
          </div>
          <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:20px;animation:fadeUp 0.4s ease 1.2s both;">
            <div style="font-size:14px;font-weight:600;margin-bottom:12px;">Protocol Distribution</div>
            ${protoBar('ARINC 429',65,'#3b82f6')}
            ${protoBar('CAN Bus',20,'#8b5cf6')}
            ${protoBar('MIL-STD-1553',10,'#f59e0b')}
            ${protoBar('ARINC 664',5,'#22c55e')}
          </div>
        </div>
      </div>
    </div>
  </div>
  <style>@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}</style>`
},
// ---- SCENE 3: Signal List ----

              ${signalRow('ALTITUDE_BARO','active','critical','ARINC 429','ADC_BUS_1',false,'')}
              ${signalRow('HEADING_MAG','draft','major','CAN Bus','NAV_CAN',false,'')}
              ${signalRow('ENGINE_TEMP_L','active','critical','CAN Bus','ENG_CAN_1',false,'')}
              ${signalRow('FUEL_FLOW_L','active','major','MIL-STD-1553','FUEL_1553',false,'')}
            </tbody>

        </div>
      </div>
    </div>
  </div>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes typeSearch{to{width:100px;}}
    @keyframes highlightRow{0%{background:transparent;}30%{background:#dbeafe;}100%{background:#eff6ff;}}

},
// ---- SCENE 4: Signal Detail (Three-Layer View) ----

// ---- SCENE 5: AI Document Extraction ----

// ---- SCENE 7: Wiring Diagram ----
{
  title: "Scene 7 of 7 — Wiring Diagram",
  duration: 6000,
  render: () => `

// =========================================================================
// Helper functions for building UI components
// =========================================================================

function sidebar(active) {
  const items = [
    {icon:'◻',label:'Dashboard'},{icon:'⚡',label:'Signals'},{icon:'📡',label:'Live Data'},
    {icon:'🔌',label:'Wiring'},{icon:'📄',label:'Documents'},{icon:'🔀',label:'Baselines'},
    {icon:'🔗',label:'Traceability'},{icon:'🛡',label:'Workflows'},{icon:'⚠',label:'Anomalies'},
    {icon:'⚙',label:'Settings'}
  ];
  return `<div style="width:200px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;">
    <div style="padding:16px;font-size:15px;font-weight:700;color:#3b82f6;border-bottom:1px solid #e2e8f0;">ConnectedFlow</div>
    <nav style="flex:1;padding:8px;">
      ${items.map(i => `<a style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:13px;text-decoration:none;color:${i.label===active?'#1e40af':'#64748b'};background:${i.label===active?'#eff6ff':'transparent'};font-weight:${i.label===active?'500':'400'};margin-bottom:2px;">${i.icon} ${i.label}</a>`).join('')}
    </nav>
  </div>`;
}

function topbar() {
  return `<div style="height:48px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:flex-end;padding:0 16px;gap:8px;background:#fff;">
    <div style="width:28px;height:28px;border-radius:6px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;">🌙</div>
    <div style="width:28px;height:28px;border-radius:6px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;">🔔</div>
    <div style="width:28px;height:28px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:600;">JD</div>
  </div>`;
}

function statCard(label, value, style, color) {
  return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:16px;${style}">
    <div style="font-size:12px;color:#64748b;font-weight:500;">${label}</div>
    <div style="font-size:28px;font-weight:700;margin-top:4px;color:${color||'#0f172a'};">${value}</div>
  </div>`;
}

function activityRow(text, time, color) {
  return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:12px;">
    <div style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0;"></div>
    <div style="flex:1;color:#334155;">${text}</div>
    <div style="color:#94a3b8;font-size:11px;white-space:nowrap;">${time}</div>
  </div>`;
}

function protoBar(label, pct, color) {
  return `<div style="margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#475569;">${label}</span><span style="color:#94a3b8;">${pct}%</span></div>
    <div style="height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${color};border-radius:3px;animation:growBar 1s ease 1.5s both;transform-origin:left;" ></div></div>
  </div>
  <style>@keyframes growBar{from{transform:scaleX(0);}to{transform:scaleX(1);}}</style>`;
}

function signalRow(name, status, crit, proto, bus, highlight, style) {
  const statusColor = status==='active'?'#dcfce7;color:#166534':'#f1f5f9;color:#475569';
  const critColor = crit==='critical'?'#fef2f2;color:#991b1b':crit==='major'?'#fef3c7;color:#92400e':'#f1f5f9;color:#475569';
  return `<tr style="border-bottom:1px solid #f1f5f9;${style}">
    <td style="padding:10px 16px;font-weight:500;">${name}</td>
    <td style="padding:10px 16px;"><span style="background:${statusColor};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">${status}</span></td>
    <td style="padding:10px 16px;"><span style="background:${critColor};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">${crit}</span></td>
    <td style="padding:10px 16px;color:#64748b;">${proto}</td>
    <td style="padding:10px 16px;color:#64748b;">${bus}</td>
    <td style="padding:10px 16px;color:#94a3b8;">›</td>
  </tr>`;
}

function fieldDisplay(label, value) {
  return `<div>
    <div style="font-size:11px;color:#64748b;font-weight:500;margin-bottom:3px;">${label}</div>
    <div style="border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:13px;background:#f8fafc;">${value}</div>
  </div>`;
}

function validationItem(icon, text, color, bg) {
  return `<div style="background:${bg};border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:12px;color:${color};display:flex;align-items:flex-start;gap:6px;">
    <span>${icon}</span><span>${text}</span>
  </div>`;
}

function extractionRow(name, confidence, needsReview) {
  const color = confidence>=80?'#dcfce7;color:#166534':confidence>=50?'#fef3c7;color:#92400e':'#fef2f2;color:#991b1b';
  return `<div style="border:1px solid ${needsReview?'#fde68a':'#e2e8f0'};border-radius:6px;padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;background:${needsReview?'#fffbeb':'#fff'};">
    <span style="font-size:13px;font-weight:500;">${name}</span>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="background:${color};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">${confidence}%</span>
      ${needsReview?'<span style="font-size:11px;color:#92400e;">⚠ Review</span>':''}
    </div>
  </div>`;
}

function liveCard(name, value, unit, severity, style) {
  const border = severity==='error'?'border-color:#fecaca;background:#fef2f2;':severity==='warning'?'border-color:#fde68a;background:#fffbeb;':'';
  const valColor = severity==='error'?'color:#ef4444;':severity==='warning'?'color:#f59e0b;':'';
  const indicator = severity==='error'?'<div style="font-size:10px;color:#ef4444;margin-top:2px;">✕ Out of range</div>':severity==='warning'?'<div style="font-size:10px;color:#f59e0b;margin-top:2px;">⚠ Near limit</div>':'<div style="font-size:10px;color:#22c55e;margin-top:2px;">● In range</div>';
  return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px;${border}${style}">
    <div style="font-size:11px;color:#64748b;">${name}</div>
    <div class="live-value" style="font-size:26px;font-weight:700;margin-top:4px;${valColor}">${value} <span style="font-size:13px;font-weight:400;color:#94a3b8;">${unit}</span></div>
    ${indicator}
  </div>`;
}

// =========================================================================
// Navigation & auto-play logic
// =========================================================================

let currentScene = 0;
let autoPlayTimer = null;
let isAutoPlaying = false;

function renderScene(idx) {
  currentScene = idx;
  const scene = scenes[idx];
  document.getElementById('appFrame').innerHTML = scene.render();
  document.getElementById('scene-label').textContent = scene.title;
  document.getElementById('progress').style.width = `${((idx+1)/scenes.length)*100}%`;
}

function nextScene() {
  if (currentScene < scenes.length - 1) renderScene(currentScene + 1);
  else renderScene(0);
}

function prevScene() {
  if (currentScene > 0) renderScene(currentScene - 1);
  else renderScene(scenes.length - 1);
}

function toggleAutoPlay() {
  if (isAutoPlaying) {
    clearInterval(autoPlayTimer);
    autoPlayTimer = null;
    isAutoPlaying = false;
    document.getElementById('autoBtn').textContent = '▶ Auto Play';
    document.getElementById('autoBtn').classList.add('active-btn');
  } else {
    isAutoPlaying = true;
    document.getElementById('autoBtn').textContent = '⏸ Pause';
    autoPlayTimer = setInterval(() => {
      nextScene();
    }, scenes[currentScene].duration);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextScene(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevScene(); }
});

// Initial render
renderScene(0);
</script>
