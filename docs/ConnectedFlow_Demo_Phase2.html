<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectedFlow — Phase 2 Interactive Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;overflow:hidden;height:100vh;width:100vw;}
.demo-container{width:100%;height:100%;display:flex;flex-direction:column;}
.demo-header{background:#0f172a;color:#e2e8f0;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.demo-header .brand{font-weight:700;color:#3b82f6;font-size:15px;}
.demo-header .controls{display:flex;gap:8px;align-items:center;}
.demo-header button{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
.demo-header button:hover{background:#334155;}
.demo-header button.active-btn{background:#3b82f6;border-color:#3b82f6;color:#fff;}
.progress-bar{height:3px;background:#1e293b;width:100%;}
.progress-fill{height:100%;background:#3b82f6;transition:width 0.3s ease;width:0%;}
.app-frame{flex:1;display:flex;overflow:hidden;}
</style>
</head>
<body>
<div class="demo-container">
  <div class="demo-header">
    <span class="brand">ConnectedFlow Phase 2 Demo</span>
    <div class="controls">
      <span id="scene-label" style="color:#94a3b8;margin-right:12px;">Scene 1 of 8</span>
      <button onclick="prevScene()">← Prev</button>
      <button class="active-btn" onclick="toggleAutoPlay()" id="autoBtn">▶ Auto Play</button>
      <button onclick="nextScene()">Next →</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="app-frame" id="appFrame"></div>
</div>
</body>
</html>
<script>
// =========================================================================
// Helper functions for building UI components
// =========================================================================

function sidebar(active) {
  const items = [
    {icon:'◻',label:'Dashboard'},{icon:'📁',label:'Projects'},{icon:'⚡',label:'Signals'},
    {icon:'🔌',label:'Connectors'},{icon:'📡',label:'Bus Analysis'},{icon:'🔋',label:'Power Budget'},
    {icon:'⚖',label:'Mass & Cost'},{icon:'📊',label:'Trade Studies'},{icon:'🔗',label:'Wiring'},
    {icon:'⚙',label:'Settings'}
  ];
  return `<div style="width:200px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;">
    <div style="padding:16px;font-size:15px;font-weight:700;color:#3b82f6;border-bottom:1px solid #e2e8f0;">ConnectedFlow</div>
    <nav style="flex:1;padding:8px;">
      ${items.map(i => `<a style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:13px;text-decoration:none;color:${i.label===active?'#1e40af':'#64748b'};background:${i.label===active?'#eff6ff':'transparent'};font-weight:${i.label===active?'500':'400'};margin-bottom:2px;">${i.icon} ${i.label}</a>`).join('')}
    </nav>
  </div>`;
}

function topbar() {
  return `<div style="height:48px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:8px;background:#fff;">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:5px 12px;font-size:12px;color:#1e40af;font-weight:500;">AeroX eVTOL — WD-001</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;border-radius:6px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;">🌙</div>
      <div style="width:28px;height:28px;border-radius:6px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;">🔔</div>
      <div style="width:28px;height:28px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:600;">JS</div>
    </div>
  </div>`;
}

function statCard(label, value, style, color) {
  return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:16px;${style}">
    <div style="font-size:12px;color:#64748b;font-weight:500;">${label}</div>
    <div style="font-size:28px;font-weight:700;margin-top:4px;color:${color||'#0f172a'};">${value}</div>
  </div>`;
}

function fieldInput(label, value, animClass) {
  return `<div style="margin-bottom:14px;">
    <label style="font-size:12px;font-weight:500;color:#475569;display:block;margin-bottom:4px;">${label}</label>
    <div style="border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;font-size:13px;color:#0f172a;background:#fff;">${animClass?`<span class="${animClass}"></span><span class="cursor" style="animation:blink 0.6s infinite;">|</span>`:value}</div>
  </div>`;
}

function selectInput(label, value) {
  return `<div style="margin-bottom:14px;">
    <label style="font-size:12px;font-weight:500;color:#475569;display:block;margin-bottom:4px;">${label}</label>
    <div style="border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;font-size:13px;color:#0f172a;background:#fff;display:flex;justify-content:space-between;align-items:center;">${value}<span style="color:#94a3b8;">▾</span></div>
  </div>`;
}

// =========================================================================
// Scene definitions — 8 scenes for Phase 2 features
// =========================================================================
const scenes = [
// ---- SCENE 1: Project Selection & Creation ----
{
  title: "Scene 1 of 8 — Project Selection & Creation",
  duration: 6000,
  render: () => `
  <div style="display:flex;width:100%;height:100%;">
    ${sidebar('Projects')}
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      ${topbar()}
      <div style="flex:1;padding:24px;overflow-y:auto;background:#f8fafc;">
        <div style="animation:fadeUp 0.4s ease;">
          <h1 style="font-size:22px;font-weight:600;">Projects</h1>
          <p style="font-size:13px;color:#64748b;margin-top:4px;">Manage aircraft programs and switch between projects.</p>
        </div>
        <!-- Project Selector -->
        <div style="margin-top:20px;animation:fadeUp 0.4s ease 0.2s both;">
          <label style="font-size:12px;font-weight:500;color:#475569;display:block;margin-bottom:4px;">Active Project</label>
          <div style="background:#fff;border:1px solid #3b82f6;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:500;color:#1e40af;display:flex;justify-content:space-between;align-items:center;box-shadow:0 0 0 3px rgba(59,130,246,0.1);max-width:400px;">
            AeroX eVTOL — WD-001 <span style="color:#3b82f6;">▾</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px;">
          <!-- Create New Project Dialog -->
          <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:20px;animation:fadeUp 0.4s ease 0.4s both;">
            <div style="font-size:15px;font-weight:600;margin-bottom:16px;">Create New Project</div>
            <div style="margin-bottom:14px;">
              <label style="font-size:12px;font-weight:500;color:#475569;display:block;margin-bottom:4px;">Project Name</label>
              <div style="border:1px solid #3b82f6;border-radius:6px;padding:8px 12px;font-size:13px;color:#0f172a;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,0.1);">
                <span class="typed-name"></span><span style="animation:blink 0.6s infinite;color:#3b82f6;">|</span>
              </div>
            </div>
            ${selectInput('Aircraft Type','eVTOL')}
            ${selectInput('Certification Basis','FAR 23')}
            ${selectInput('Program Phase','Concept')}
            <div style="margin-top:8px;animation:showBtn 0.3s ease 3.5s forwards;opacity:0;">
              <div style="background:#3b82f6;color:#fff;text-align:center;padding:8px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;">Create Project</div>
            </div>
          </div>
          <!-- Project Dashboard Cards -->
          <div style="animation:fadeUp 0.4s ease 0.6s both;">
            <div style="font-size:15px;font-weight:600;margin-bottom:16px;">Project Dashboard</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              ${statCard('Signals','247','animation:fadeUp 0.4s ease 0.8s both;','#3b82f6')}
              ${statCard('Buses','12','animation:fadeUp 0.4s ease 1s both;','#8b5cf6')}
              ${statCard('Equipment','28','animation:fadeUp 0.4s ease 1.2s both;','#22c55e')}
              ${statCard('Configurations','2','animation:fadeUp 0.4s ease 1.4s both;','#f59e0b')}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
    @keyframes showBtn{to{opacity:1;}}
    .typed-name::after{content:'AeroX eVTOL';animation:revealName 2s steps(11) 0.8s forwards;overflow:hidden;display:inline-block;width:0;white-space:nowrap;}
    @keyframes revealName{to{width:90px;}}
  </style>`
},
// ---- SCENE 2: Project Configurations (WD-001 vs WD-002) ----
{
  title: "Scene 2 of 8 — Project Configurations",
  duration: 6000,
  render: () => `
  <div style="display:flex;width:100%;height:100%;">
    ${sidebar('Projects')}
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      ${topbar()}
      <div style="flex:1;padding:24px;overflow-y:auto;background:#f8fafc;">
        <div style="display:flex;justify-content:space-between;align-items:center;animation:fadeUp 0.3s ease;">
          <div>
            <h1 style="font-size:22px;font-weight:600;">Configurations</h1>
            <p style="font-size:13px;color:#64748b;margin-top:4px;">AeroX eVTOL — Equipment arrangement variants</p>
          </div>
          <div class="clone-btn" style="background:#3b82f6;color:#fff;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;animation:pulseClone 2s ease 1s both;">⧉ Clone Configuration</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;">
          <!-- WD-001 Card -->
          <div style="background:#fff;border:2px solid #3b82f6;border-radius:10px;overflow:hidden;animation:fadeUp 0.4s ease 0.3s both;">
            <div style="background:#eff6ff;padding:14px 18px;border-bottom:1px solid #bfdbfe;">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="font-size:16px;font-weight:700;color:#1e40af;">WD-001</div>
                <span style="background:#dbeafe;color:#1e40af;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;">Baseline Configuration</span>
              </div>
            </div>
            <div style="padding:18px;">
              <div style="font-size:13px;font-weight:600;color:#475569;margin-bottom:12px;">Equipment Arrangement</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:12px;"><span style="font-weight:600;">1×</span> AHRS</div>
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:12px;"><span style="font-weight:600;">2×</span> IRS</div>
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:12px;"><span style="font-weight:600;">3×</span> ADC</div>
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:12px;"><span style="font-weight:600;">2×</span> FMC</div>
              </div>
              <div style="border-top:1px solid #e2e8f0;padding-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
                <div><span style="color:#64748b;">Equipment:</span> <span style="font-weight:600;">28</span></div>
                <div><span style="color:#64748b;">Signals:</span> <span style="font-weight:600;">247</span></div>
                <div><span style="color:#64748b;">Est. Weight:</span> <span style="font-weight:600;">191.0 kg</span></div>
                <div><span style="color:#64748b;">Est. Cost:</span> <span style="font-weight:600;">$1.50M</span></div>
              </div>
            </div>
          </div>
          <!-- WD-002 Card -->
          <div class="wd002-card" style="background:#fff;border:2px solid #8b5cf6;border-radius:10px;overflow:hidden;animation:slideInClone 0.6s ease 2s both;opacity:0;">
            <div style="background:#f5f3ff;padding:14px 18px;border-bottom:1px solid #c4b5fd;">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="font-size:16px;font-weight:700;color:#6d28d9;">WD-002</div>
                <span style="background:#ede9fe;color:#6d28d9;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;">Redundancy Variant</span>
              </div>
            </div>
            <div style="padding:18px;">
              <div style="font-size:13px;font-weight:600;color:#475569;margin-bottom:12px;">Equipment Arrangement</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
                <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:6px;padding:8px 10px;font-size:12px;"><span style="font-weight:600;color:#6d28d9;">2×</span> AHRS</div>
                <div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:6px;padding:8px 10px;font-size:12px;"><span style="font-weight:600;color:#6d28d9;">1×</span> IRS</div>
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:12px;"><span style="font-weight:600;">3×</span> ADC</div>
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:12px;"><span style="font-weight:600;">2×</span> FMC</div>
              </div>
              <div style="border-top:1px solid #e2e8f0;padding-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
                <div><span style="color:#64748b;">Equipment:</span> <span style="font-weight:600;">29</span></div>
                <div><span style="color:#64748b;">Signals:</span> <span style="font-weight:600;">263</span></div>
                <div><span style="color:#64748b;">Est. Weight:</span> <span style="font-weight:600;">198.4 kg</span></div>
                <div><span style="color:#64748b;">Est. Cost:</span> <span style="font-weight:600;">$1.62M</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes slideInClone{from{opacity:0;transform:translateX(-30px) scale(0.95);}to{opacity:1;transform:translateX(0) scale(1);}}
    @keyframes pulseClone{0%{box-shadow:none;}50%{box-shadow:0 0 0 6px rgba(59,130,246,0.2);}100%{box-shadow:none;}}
  </style>`
},
// ---- SCENE 3: Connector Parts Database ----
{
  title: "Scene 3 of 8 — Connector Parts Database",
  duration: 6000,
  render: () => `
  <div style="display:flex;width:100%;height:100%;">
    ${sidebar('Connectors')}
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      ${topbar()}
      <div style="flex:1;padding:24px;overflow-y:auto;background:#f8fafc;">
        <div style="display:flex;justify-content:space-between;align-items:center;animation:fadeUp 0.3s ease;">
          <div>
            <h1 style="font-size:22px;font-weight:600;">Connector Parts Database</h1>
            <p style="font-size:13px;color:#64748b;margin-top:4px;">Searchable catalog of aerospace connectors</p>
          </div>
          <div style="display:flex;gap:8px;">
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:6px 12px;font-size:13px;color:#64748b;">Import CSV</div>
            <div style="background:#3b82f6;color:#fff;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:500;">+ Add Connector</div>
          </div>
        </div>
        <!-- Search Bar -->
        <div style="margin-top:16px;display:flex;gap:8px;animation:fadeUp 0.3s ease 0.2s both;">
          <div style="flex:1;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px 8px 32px;font-size:13px;color:#94a3b8;background:#fff url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2394a3b8%22 stroke-width=%222%22><circle cx=%2211%22 cy=%2211%22 r=%228%22/><path d=%22m21 21-4.3-4.3%22/></svg>') 8px center no-repeat;">
            <span style="animation:typeSearch 1.5s steps(8) 1s forwards;overflow:hidden;display:inline-block;width:0;white-space:nowrap;color:#0f172a;">Amphenol</span>
          </div>
        </div>
        <!-- Connector Table -->
        <div style="margin-top:16px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;animation:fadeUp 0.3s ease 0.4s both;">
          <table style="width:100%;border-collapse:collapse;font-size:12px;">
            <thead><tr style="background:#f8fafc;border-bottom:1px solid #e2e8f0;">
              <th style="text-align:left;padding:10px 12px;font-weight:500;color:#64748b;">Part Number</th>
              <th style="text-align:left;padding:10px 12px;font-weight:500;color:#64748b;">Supplier</th>
              <th style="text-align:left;padding:10px 12px;font-weight:500;color:#64748b;">Type</th>
              <th style="text-align:left;padding:10px 12px;font-weight:500;color:#64748b;">Pins</th>

              <th style="text-align:left;padding:10px 12px;font-weight:500;color:#64748b;">Weight</th>
              <th style="text-align:left;padding:10px 12px;font-weight:500;color:#64748b;">Price</th>
              <th style="width:80px;"></th>
            </tr></thead>
            <tbody>
              <tr style="border-bottom:1px solid #f1f5f9;animation:highlightRow 2s ease 3s both;background:#eff6ff;">
                <td style="padding:10px 12px;font-weight:500;color:#1e40af;">D38999/26WJ35SN</td>
                <td style="padding:10px 12px;">Amphenol</td>
                <td style="padding:10px 12px;">Circular</td>
                <td style="padding:10px 12px;">79</td>
                <td style="padding:10px 12px;"><span style="background:#f0fdf4;color:#166534;padding:2px 6px;border-radius:3px;font-size:10px;">MIL-DTL-38999</span></td>

                <td style="padding:10px 12px;font-weight:500;">$285</td>
                <td style="padding:10px 12px;"><div style="background:#3b82f6;color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;text-align:center;cursor:pointer;animation:pulseLink 1.5s ease 3.5s infinite;">Link to Signal</div></td>
              </tr>
              <tr style="border-bottom:1px solid #f1f5f9;">
                <td style="padding:10px 12px;font-weight:500;">MS27467T25F61P</td>
                <td style="padding:10px 12px;">TE Connectivity</td>
                <td style="padding:10px 12px;">Circular</td>
                <td style="padding:10px 12px;">61</td>
                <td style="padding:10px 12px;"><span style="background:#f0fdf4;color:#166534;padding:2px 6px;border-radius:3px;font-size:10px;">MIL-DTL-38999</span></td>
                <td style="padding:10px 12px;">118g</td>
                <td style="padding:10px 12px;font-weight:500;">$195</td>
                <td style="padding:10px 12px;"><div style="background:#f1f5f9;color:#475569;padding:4px 8px;border-radius:4px;font-size:10px;text-align:center;">Link</div></td>
              </tr>
              <tr style="border-bottom:1px solid #f1f5f9;">
                <td style="padding:10px 12px;font-weight:500;">D-Sub DA-15P</td>
                <td style="padding:10px 12px;">ITT Cannon</td>
                <td style="padding:10px 12px;">D-Sub</td>
                <td style="padding:10px 12px;">15</td>
                <td style="padding:10px 12px;"><span style="background:#f0fdf4;color:#166534;padding:2px 6px;border-radius:3px;font-size:10px;">MIL-DTL-24308</span></td>
                <td style="padding:10px 12px;">28g</td>
                <td style="padding:10px 12px;font-weight:500;">$42</td>
                <td style="padding:10px 12px;"><div style="background:#f1f5f9;color:#475569;padding:4px 8px;border-radius:4px;font-size:10px;text-align:center;">Link</div></td>

                <td style="padding:10px 12px;font-weight:500;">ARINC 600 Size 1</td>
                <td style="padding:10px 12px;">Amphenol</td>
                <td style="padding:10px 12px;">Rectangular</td>
                <td style="padding:10px 12px;">100</td>
                <td style="padding:10px 12px;"><span style="background:#eff6ff;color:#1e40af;padding:2px 6px;border-radius:3px;font-size:10px;">ARINC 600</span></td>
                <td style="padding:10px 12px;">210g</td>
                <td style="padding:10px 12px;font-weight:500;">$450</td>

              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes typeSearch{to{width:68px;}}
    @keyframes highlightRow{0%{background:transparent;}30%{background:#dbeafe;}100%{background:#eff6ff;}}
    @keyframes pulseLink{0%,100%{box-shadow:none;}50%{box-shadow:0 0 0 4px rgba(59,130,246,0.25);}}
  </style>`
},
// ---- SCENE 4: Bus Loading & Sizing Analysis ----
{
  title: "Scene 4 of 8 — Bus Loading & Sizing Analysis",
  duration: 7000,

// =========================================================================
// Navigation & auto-play logic
// =========================================================================

let currentScene = 0;
let autoPlayTimer = null;
let isAutoPlaying = false;

function renderScene(idx) {
  currentScene = idx;
  const scene = scenes[idx];
  document.getElementById('appFrame').innerHTML = scene.render();
  document.getElementById('scene-label').textContent = scene.title;
  document.getElementById('progress').style.width = `${((idx+1)/scenes.length)*100}%`;
  // Reset auto-play timer with scene-specific duration
  if (isAutoPlaying) {
    clearTimeout(autoPlayTimer);
    autoPlayTimer = setTimeout(() => { nextScene(); }, scene.duration);
  }
}

function nextScene() {
  if (currentScene < scenes.length - 1) renderScene(currentScene + 1);
  else renderScene(0);
}

function prevScene() {
  if (currentScene > 0) renderScene(currentScene - 1);
  else renderScene(scenes.length - 1);
}

function toggleAutoPlay() {
  if (isAutoPlaying) {
    clearTimeout(autoPlayTimer);
    autoPlayTimer = null;
    isAutoPlaying = false;
    document.getElementById('autoBtn').textContent = '▶ Auto Play';
    document.getElementById('autoBtn').classList.add('active-btn');
  } else {
    isAutoPlaying = true;
    document.getElementById('autoBtn').textContent = '⏸ Pause';
    autoPlayTimer = setTimeout(() => { nextScene(); }, scenes[currentScene].duration);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextScene(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevScene(); }
});

// Click navigation on the app frame
document.getElementById('appFrame').addEventListener('click', (e) => {
  // Don't navigate if clicking on interactive elements
  if (e.target.closest('button, a, [onclick]')) return;
});

// Initial render
renderScene(0);
</script>
