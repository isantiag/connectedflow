apiVersion: v1
kind: ConfigMap
metadata:
  name: connectedflow-config
  namespace: connectedflow-core
  labels:
    app.kubernetes.io/part-of: connectedflow
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  POSTGRES_HOST: "postgres.connectedflow-data.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "connectedflow"
  TIMESCALEDB_HOST: "timescaledb.connectedflow-data.svc.cluster.local"
  TIMESCALEDB_PORT: "5432"
  TIMESCALEDB_DB: "connectedflow_timeseries"
  REDIS_HOST: "redis.connectedflow-data.svc.cluster.local"
  REDIS_PORT: "6379"
  PYTHON_AI_SERVICE_URL: "http://python-ai.connectedflow-core.svc.cluster.local:8000"
  CONFIDENCE_THRESHOLD: "0.7"
  LLM_PROVIDER: "openai"
