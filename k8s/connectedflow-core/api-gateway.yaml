apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: connectedflow-core
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: connectedflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: connectedflow/api-gateway:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: connectedflow-config
            - secretRef:
                name: connectedflow-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: connectedflow-core
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: connectedflow
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  type: ClusterIP
